<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child Development & Pedagogy Interactive Quiz</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .quiz-card {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .question-counter {
            font-size: 1.15rem;
            font-weight: 700;
            color: #2c3e50;
        }

        .timer-badge {
            background-color: #ffe5e5;
            color: #e74c3c;
            font-weight: 700;
            font-size: 1.05rem;
            padding: 8px 16px;
            border-radius: 20px;
        }

        .divider {
            height: 1px;
            background-color: #e2e8f0;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 700;
            color: #1a2533;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option-btn {
            background-color: #ffffff;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 1rem;
            font-weight: 600;
            color: #2d3748;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #3b82f6;
            background-color: #f8fafc;
        }

        .option-btn.selected {
            border-color: #3b82f6;
            background-color: #eff6ff;
            color: #1d4ed8;
        }

        .option-btn.correct {
            border-color: #10b981;
            background-color: #ecfdf5;
            color: #047857;
        }

        .option-btn.incorrect {
            border-color: #ef4444;
            background-color: #fef2f2;
            color: #b91c1c;
        }

        .navigation-container {
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            flex: 1;
            padding: 14px;
            font-size: 1.05rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .prev-btn {
            background-color: #cccccc;
            color: #ffffff;
        }

        .prev-btn:hover:not(:disabled) {
            background-color: #b3b3b3;
        }

        .next-btn {
            background-color: #007bff;
            color: #ffffff;
        }

        .next-btn:hover:not(:disabled) {
            background-color: #0056b3;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="quiz-header">
        <div class="question-counter" id="counter">Question 1 / 100</div>
        <div class="timer-badge" id="timer">Time Left: 20s</div>
    </div>
    <div class="divider"></div>

    <div class="question-text" id="question">బోధనాంశం లోడ్ అవుతోంది...</div>

    <div class="options-container" id="options"></div>

    <div class="navigation-container">
        <button class="nav-btn prev-btn" id="prevBtn" onclick="prevQuestion()">Previous</button>
        <button class="nav-btn next-btn" id="nextBtn" onclick="nextQuestion()">Next Question</button>
    </div>
</div>

let currentIndex = 0;
let timeLeft = 20;
let timerInterval = null;
let userAnswers = new Array(quizData.length).fill(null);

const counterEl = document.getElementById("counter");
const timerEl = document.getElementById("timer");
const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

function loadQuestion(index) {
    clearInterval(timerInterval);
    timeLeft = 20;
    updateTimerDisplay();

    counterEl.innerText = `Question ${index + 1} / ${quizData.length}`;
    
    // Display question with number
    const currentQ = quizData[index];
    questionEl.innerText = `${index + 1}. ${currentQ.q.replace(/^\d+\.\s*/, '')}`;

    optionsEl.innerHTML = "";

    currentQ.options.forEach((optText, optIdx) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerText = optText;

        if (userAnswers[index] !== null) {
            btn.disabled = true;
            if (optIdx === currentQ.answer) {
                btn.classList.add("correct");
            }
            if (userAnswers[index] === optIdx && optIdx !== currentQ.answer) {
                btn.classList.add("incorrect");
            }
        } else {
            btn.onclick = () => selectOption(optIdx);
        }

        optionsEl.appendChild(btn);
    });

    prevBtn.disabled = (index === 0);
    nextBtn.innerText = (index === quizData.length - 1) ? "Finish Quiz" : "Next Question";

    if (userAnswers[index] === null) {
        startTimer();
    }
}

function startTimer() {
    timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            timeOut();
        }
    }, 1000);
}

function updateTimerDisplay() {
    timerEl.innerText = `Time Left: ${timeLeft}s`;
}

function timeOut() {
    if (userAnswers[currentIndex] === null) {
        userAnswers[currentIndex] = -1; // -1 represents timed out without choice
        revealAnswers();
    }
}

function selectOption(selectedIdx) {
    clearInterval(timerInterval);
    userAnswers[currentIndex] = selectedIdx;
    revealAnswers();
}

function revealAnswers() {
    const currentQ = quizData[currentIndex];
    const optionBtns = optionsEl.children;

    for (let i = 0; i < optionBtns.length; i++) {
        optionBtns[i].disabled = true;
        if (i === currentQ.answer) {
            optionBtns[i].classList.add("correct");
        } else if (userAnswers[currentIndex] === i) {
            optionBtns[i].classList.add("incorrect");
        }
    }
}

function nextQuestion() {
    if (currentIndex < quizData.length - 1) {
        currentIndex++;
        loadQuestion(currentIndex);
    } else {
        clearInterval(timerInterval);
        showScoreSummary();
    }
}

function prevQuestion() {
    if (currentIndex > 0) {
        currentIndex--;
        loadQuestion(currentIndex);
    }
}

function showScoreSummary() {
    let score = 0;
    userAnswers.forEach((ans, idx) => {
        if (ans === quizData[idx].answer) score++;
    });

    document.querySelector(".quiz-card").innerHTML = `
        <h2 style="text-align: center; color: #1a2533; margin-bottom: 15px;">పరీక్ష పూర్తయింది!</h2>
        <p style="text-align: center; font-size: 1.2rem; color: #2d3748; margin-bottom: 25px;">
            మీ స్కోరు: <strong>${score} / ${quizData.length}</strong>
        </p>
        <button class="nav-btn next-btn" style="width: 100%;" onclick="location.reload()">మళ్లీ ప్రయత్నించండి</button>
    `;
}

// Initial Call
loadQuestion(0);
</script>
